{{define "title"}}Sign in{{end}}
{{define "content"}}
<h1>Sign in</h1>
<p class="sub">Enter your email and we'll send you a sign-in code.</p>
{{if .Error}}<div class="err">{{.Error}}</div>{{end}}
<form method="post" action="/request" autocomplete="on">
  <input type="hidden" name="rd" value="{{.Redirect}}">
  <label for="email">Email address</label>
  <input id="email" name="email" type="email" inputmode="email" autocomplete="email"
         autocapitalize="off" autocorrect="off" spellcheck="false" required autofocus
         value="{{.Email}}" placeholder="you@example.com">
  <label class="check"><input type="checkbox" name="remember" value="1" {{if .Remember}}checked{{end}}> Keep me signed in</label>
  <button type="submit">Send code</button>
</form>
{{end}}
