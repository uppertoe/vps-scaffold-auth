{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>{{template "title" .}}</title>
<style>
  /* Palette. All colours live here as custom properties; the dark-mode block
     below re-points the same names, so the rules further down never hardcode a
     hex value or repeat a per-rule @media override. */
  :root {
    color-scheme: light dark;
    --accent: #2563eb;        /* brand / primary action */
    --accent-hover: #1d4ed8;
    --bg: #f6f7f9;            /* page background */
    --surface: #fff;         /* card */
    --card-border: transparent;
    --text: #1c1e21;
    --muted: #65676b;        /* secondary text, placeholders */
    --soft-bg: #f0f2f5;      /* inset blocks (QR string) */
    --input-bg: #fff;
    --input-border: #ccd0d5;
    --err-bg: #fde8e8;
    --err-text: #9b1c1c;
    --ok-bg: #e6f4ea;
    --ok-text: #1e6b39;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181c;
      --surface: #1f2228;
      --card-border: #2c2f36;
      --text: #e7e9ea;
      --muted: #9aa0a6;
      --soft-bg: #14161a;
      --input-bg: #14161a;
      --input-border: #3a3d44;
      --err-bg: #3a1a1a;
      --err-text: #f3b4b4;
      --ok-bg: #16301f;
      --ok-text: #92d7a8;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px; background: var(--surface); border-radius: 14px; padding: 28px 24px;
    border: 1px solid var(--card-border);
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
  }
  /* Dark cards sit on a dark page, so the drop shadow reads as nothing; the
     1px border (transparent in light mode) does the separating instead. */
  @media (prefers-color-scheme: dark) { .card { box-shadow: none; } }
  .brand { text-align: center; margin: 0 0 18px; }
  .brand img { max-height: 52px; max-width: 70%; }
  /* The default logo is a monochrome black-on-transparent mark, which would
     vanish on the dark card; invert it to white in dark mode. This assumes a
     monochrome logo — a full-colour logo would instead need a dedicated reversed
     asset. */
  @media (prefers-color-scheme: dark) { .brand img { filter: invert(1); } }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px; }
  input[type=email], input[type=text] {
    width: 100%; padding: 12px 14px; font-size: 16px; border: 1px solid var(--input-border); border-radius: 10px;
    background: var(--input-bg); color: var(--text); margin-bottom: 16px;
  }
  /* Explicit text colour: an inherited light colour on the white base
     background was the original white-on-white bug. */
  input::placeholder { color: var(--muted); }
  /* The trailing letter-spacing after the last digit makes centred text sit
     slightly left of centre; text-indent of half the letter-spacing cancels it
     so the digits are evenly centred. */
  input.code { letter-spacing: .4em; text-indent: .2em; text-align: center; font-size: 22px; font-variant-numeric: tabular-nums; }
  /* The field is autofocused, so without this the caret would sit in the middle
     of the "000000" hint, which reads as uneven. Hide the placeholder once the
     field has focus, leaving just the caret; it returns if focus is lost. */
  input.code:focus::placeholder { color: transparent; }
  button {
    width: 100%; padding: 12px 14px; font-size: 16px; font-weight: 600; border: 0; border-radius: 10px;
    background: var(--accent); color: #fff; cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  a.btn {
    display: block; width: 100%; padding: 12px 14px; font-size: 16px; font-weight: 600;
    border-radius: 10px; background: var(--accent); color: #fff; text-align: center; text-decoration: none;
  }
  a.btn:hover { background: var(--accent-hover); }
  .linkbtn { width: auto; margin: 0; padding: 0; background: none; border: 0; color: var(--accent); font: inherit; cursor: pointer; }
  .linkbtn:hover { text-decoration: underline; }
  .err { background: var(--err-bg); color: var(--err-text); border-radius: 10px; padding: 10px 12px; font-size: 14px; margin-bottom: 16px; }
  /* Success confirmation (e.g. "email verified" before the second factor), so a
     step that asks for another code doesn't read as the previous one failing. */
  .ok { background: var(--ok-bg); color: var(--ok-text); border-radius: 10px; padding: 10px 12px; font-size: 14px; margin-bottom: 16px; }
  label.check { display: flex; align-items: center; gap: 8px; font-weight: 400; margin: -4px 0 16px; cursor: pointer; }
  label.check input { width: auto; margin: 0; }
  .links { margin-top: 18px; text-align: center; font-size: 14px; }
  .links a { color: var(--accent); text-decoration: none; }
  .qr { word-break: break-all; font-size: 12px; color: var(--muted); background: var(--soft-bg); padding: 10px; border-radius: 8px; margin-bottom: 16px; }
</style>
</head>
<body>
  <main class="card">
    {{if .LogoURL}}<div class="brand"><img src="{{.LogoURL}}" alt=""></div>{{end}}
    {{template "content" .}}
  </main>
</body>
</html>{{end}}
