{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>{{template "title" .}}</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f7f9; color: #1c1e21; padding: 24px;
  }
  @media (prefers-color-scheme: dark) { body { background: #16181c; color: #e7e9ea; } }
  .card {
    width: 100%; max-width: 380px; background: #fff; border-radius: 14px; padding: 28px 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) { .card { background: #1f2228; box-shadow: none; border: 1px solid #2c2f36; } }
  .brand { text-align: center; margin: 0 0 18px; }
  .brand img { max-height: 52px; max-width: 70%; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { margin: 0 0 20px; color: #65676b; font-size: 14px; }
  @media (prefers-color-scheme: dark) { p.sub { color: #9aa0a6; } }
  label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px; }
  input[type=email], input[type=text] {
    width: 100%; padding: 12px 14px; font-size: 16px; border: 1px solid #ccd0d5; border-radius: 10px;
    background: #fff; color: inherit; margin-bottom: 16px;
  }
  @media (prefers-color-scheme: dark) { input { background: #14161a; border-color: #3a3d44; } }
  input.code { letter-spacing: .4em; text-align: center; font-size: 22px; font-variant-numeric: tabular-nums; }
  button {
    width: 100%; padding: 12px 14px; font-size: 16px; font-weight: 600; border: 0; border-radius: 10px;
    background: #2563eb; color: #fff; cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  .err { background: #fde8e8; color: #9b1c1c; border-radius: 10px; padding: 10px 12px; font-size: 14px; margin-bottom: 16px; }
  @media (prefers-color-scheme: dark) { .err { background: #3a1a1a; color: #f3b4b4; } }
  label.check { display: flex; align-items: center; gap: 8px; font-weight: 400; margin: -4px 0 16px; cursor: pointer; }
  label.check input { width: auto; margin: 0; }
  .links { margin-top: 18px; text-align: center; font-size: 14px; }
  .links a { color: #2563eb; text-decoration: none; }
  .qr { word-break: break-all; font-size: 12px; color: #65676b; background: #f0f2f5; padding: 10px; border-radius: 8px; margin-bottom: 16px; }
  @media (prefers-color-scheme: dark) { .qr { background: #14161a; color: #9aa0a6; } }
</style>
</head>
<body>
  <main class="card">
    {{if .LogoURL}}<div class="brand"><img src="{{.LogoURL}}" alt=""></div>{{end}}
    {{template "content" .}}
  </main>
</body>
</html>{{end}}
